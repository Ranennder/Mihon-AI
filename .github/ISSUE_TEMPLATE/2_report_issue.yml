name: Issue report
description: Report an issue in Mihon AI
labels: [bug]
body:
  - type: textarea
    id: reproduce-steps
    attributes:
      label: Steps to reproduce
      description: Provide an example of the issue.
      placeholder: |
        Example:
          1. First step
          2. Second step
          3. Issue here
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: Explain what should happen.
      placeholder: |
        Example:
          "This should happen..."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: Explain what actually happens.
      placeholder: |
        Example:
          "This happened instead..."
    validations:
      required: true

  - type: textarea
    id: crash-logs
    attributes:
      label: Crash logs
      description: |
        If you're experiencing crashes, if possible, go to the app's **More -> Settings -> Advanced** page, press **Dump crash logs**, and share the crash logs here.
      placeholder: |
        You can upload the crash log file as an attachment, or paste the crash logs in plain text if needed.

  - type: input
    id: app-version
    attributes:
      label: Mihon AI version
      description: You can find your app version in **More -> About**.
      placeholder: |
        Example: "0.1.0"
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android version
      description: You can find this somewhere in your Android settings.
      placeholder: |
        Example: "Android 11"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: List your device and model.
      placeholder: |
        Example: "Google Pixel 8"
    validations:
      required: true

  - type: dropdown
    id: backend-mode
    attributes:
      label: AI backend
      description: Which backend were you using when the issue happened?
      options:
        - Remote PC
        - GPU
        - AI was off
    validations:
      required: true

  - type: dropdown
    id: reader-mode
    attributes:
      label: Reader mode
      description: Which reader mode were you using?
      options:
        - Webtoon
        - Pager
        - Not sure
    validations:
      required: true

  - type: input
    id: companion-version
    attributes:
      label: Companion version
      description: If you were using `Remote PC`, which companion `.exe` version was running?
      placeholder: |
        Example: "v26"

  - type: textarea
    id: other-details
    attributes:
      label: Other details
      placeholder: |
        Additional details and attachments.

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: Read this carefully before submitting the report.
      options:
        - label: I have searched the existing issues and this is not a duplicate.
          required: true
        - label: I have written a short but informative title.
          required: true
        - label: I have updated the app to the latest Mihon AI release.
          required: true
        - label: I have filled out all of the requested information in this form, including specific version numbers.
          required: true
        - label: I understand that Mihon AI does not ship or maintain third-party sources or extensions.
          required: true
