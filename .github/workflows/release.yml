name: Release
on:
  push:
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  get_tag:
    name: Extract tag name
    runs-on: 'ubuntu-24.04'
    outputs:
      tag: ${{ steps.extract.outputs.tag }}

    steps:
      - name: Get tag name
        id: extract
        run: echo "tag=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT

  build:
    name: Build
    runs-on: 'ubuntu-24.04'
    needs: get_tag

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Build
        run: ./gradlew assembleRelease -Penable-updater

      - name: Rename APK
        run: |
          set -e

          mv app/build/outputs/apk/release/app-universal-release.apk mihon-ai-${{ needs.get_tag.outputs.tag }}.apk
          mv app/build/outputs/apk/release/app-arm64-v8a-release.apk mihon-ai-arm64-v8a-${{ needs.get_tag.outputs.tag }}.apk
          mv app/build/outputs/apk/release/app-armeabi-v7a-release.apk mihon-ai-armeabi-v7a-${{ needs.get_tag.outputs.tag }}.apk
          mv app/build/outputs/apk/release/app-x86-release.apk mihon-ai-x86-${{ needs.get_tag.outputs.tag }}.apk
          mv app/build/outputs/apk/release/app-x86_64-release.apk mihon-ai-x86_64-${{ needs.get_tag.outputs.tag }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: mihon-ai
          path: |
            mihon-ai-${{ needs.get_tag.outputs.tag }}.apk
            mihon-ai-arm64-v8a-${{ needs.get_tag.outputs.tag }}.apk
            mihon-ai-armeabi-v7a-${{ needs.get_tag.outputs.tag }}.apk
            mihon-ai-x86-${{ needs.get_tag.outputs.tag }}.apk
            mihon-ai-x86_64-${{ needs.get_tag.outputs.tag }}.apk

  build_companion_windows:
    name: Build Windows Companion
    runs-on: windows-2022
    needs: get_tag

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build companion
        working-directory: companion/reader-ai-server
        shell: cmd
        run: build_windows_exe.bat

      - name: Rename companion
        shell: pwsh
        run: |
          Rename-Item -Path 'companion/reader-ai-server/dist/MihonAiCompanion.exe' -NewName 'MihonAiCompanion-${{ needs.get_tag.outputs.tag }}-windows.exe'

      - name: Upload companion
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: mihon-ai-companion-windows
          path: companion/reader-ai-server/dist/MihonAiCompanion-${{ needs.get_tag.outputs.tag }}-windows.exe

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [get_tag, build, build_companion_windows]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          merge-multiple: true

      - name: Delete all artifacts
        uses: geekyeggo/delete-artifact@f275313e70c08f6120db482d7a6b98377786765b # v5.1.0
        with:
          failOnError: false
          name: |
            mihon-ai
            mihon-ai-companion-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.get_tag.outputs.tag }}
          name: Mihon AI ${{ needs.get_tag.outputs.tag }}
          body: |
            Android reader with AI upscaling for manga, manhwa, and webtoons.
            Includes Android APKs and a standalone Windows companion executable.

            <!-->



            <!-->

            > [!TIP]
            >
            > ### If you are unsure which version to download then go with `mihon-ai-${{ needs.get_tag.outputs.tag }}.apk`
          files: |
            mihon-ai-${{ needs.get_tag.outputs.tag }}.apk
            mihon-ai-arm64-v8a-${{ needs.get_tag.outputs.tag }}.apk
            mihon-ai-armeabi-v7a-${{ needs.get_tag.outputs.tag }}.apk
            mihon-ai-x86-${{ needs.get_tag.outputs.tag }}.apk
            mihon-ai-x86_64-${{ needs.get_tag.outputs.tag }}.apk
            MihonAiCompanion-${{ needs.get_tag.outputs.tag }}-windows.exe
          draft: true
          prerelease: false
          token: ${{ github.token }}
